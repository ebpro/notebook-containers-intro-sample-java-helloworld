name: CI (self-hosted-safe)

on:
  push:
    branches:
      - 'feature/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'feature/*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Maven, GH-hosted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Maven repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
      - name: Validate
        run: ./mvnw -DskipTests validate

  build-docker:
    name: Build & smoke-test images (self-hosted)
    needs: validate
    runs-on: [self-hosted, Linux, X64]
    if: >
      github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Cache Maven repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - name: Build images
        run: |
          docker buildx build --progress=plain --load -t javahello:02 -f Dockerfile.02.mavenimagestage .
          docker buildx build --progress=plain --load -t javahello:03 -f Dockerfile.03.dockercache .
      - name: Smoke test
        run: |
          docker run --rm javahello:02
          docker run --rm javahello:03

  publish:
    name: Publish images (tags only)
    runs-on: [self-hosted, Linux, X64]
    needs: build-docker
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push images
        run: |
          docker tag javahello:02 myorg/javahello:02-${{ github.sha }}
          docker push myorg/javahello:02-${{ github.sha }}
